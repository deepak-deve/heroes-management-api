<!--python+flask to file heroes.db HTML usig jinja -->
<!DOCTYPE html>
<html>
<head>
<style>

body{
   margin:0;
   overflow-x:hidden;
   box-sizing:border-box;
}
h1{
   text-align:center;
   color:orangered;
   font-size:45px;
   font-family:serif;
}
h2{
   text-align:left;
   color:green;
}
#d {
   color:red;
}
input[type="text"],
input[type="number"] {
   width:25%;
   padding:6px;
    border:1.5px solid black;
   border-radius:6px;
}
form{
   margin:20px;
}
#btna{
   background-color:lightgreen;
   width:15%
}
#btnd{
   background-color:lightpink;
   width:15%
}
.table{
   border:1px solid black;
   width:90%;
   margin:20px;
   border-collapse:collapse;
}
.table th{
   background-color:lightblue;
   border:1px solid black;
   padding:8px;
   font-size:25px;
   
}
.table td{
    border:1px solid black;
    padding:4px;
    font-size:20px;
   
}
nav{
    display: flex; 
    justify-content: center; 
    align-items: center;
    font-family: sans-serif; 
    background:linear-gradient(indigo,crimson); 
    font-size:30px; 
    padding: 10px; 
    margin: 40px auto;
    width:20%;
    border-radius:20px
}
nav a{
    color:white;
    text-decoration:none;
}

</style>

    <title>My Herores</title>
</head>
<body>
<img src="{{url_for('static',filename='Heroes.jpeg')}}" width="980" 
            height="200" alt="My pic">
<h1> My Heroes List</h1>

<h2>----Add New Hero----</h2>
<form action="/add" method="POST">
    <input type="text" name="newname" placeholder="Enter name">
    <input type="text" name="newskill" placeholder="Enter skill">
    <input type="number" name="newrank" placeholder="Enter rank">
    <button type="submit" id="btna"> click here </button>
</form>

<h2 id="d">--- Delete Hero ---</h2>
<form action="/del" method="POST">
    <input type="text" name="delname" placeholder="Enter name">
    <input type="text" name="delskill" placeholder="Enter skill">
    <!--input type="number" name="delrank" placeholder="Enter rank"-->
    <button type="submit" id="btnd">Delete Hero</button>
</form>

<hr>

<table class="table">
    <tr>
        <th>No</th>
        <th>Name</th>
        <th>Skill</th>
        <th>Rank</th>
        <th> </th>
    </tr>

    {%for i in heroes %} <!-- jinja -->
 
    <tr>
        <td>{{loop.index}}</td>
        <td>{{i[0]}}</td> <!--We want show existing data so usercan change it-->
        <td>{{i[1]}}</td>
        <td>{{i[2]}}</td>
        <td>
        <a href="/edit/{{i[0]}}">Edit</a> <!--Create link→/edit/hero_name-->
        </td>
    </tr>
    {% endfor %} <!--jinja -->
</table>
<nav>
    <a href="/logout">Logout</a>
</nav>
</body>
</html>
